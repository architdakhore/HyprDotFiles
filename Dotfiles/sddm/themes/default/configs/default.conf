[General]
scale = 1.0
enable-animations = true
background-fill-mode = fill

[LockScreen]
display = true
background = 1.mp4
blur = 2
brightness = -0.05
saturation = -0.1

[LockScreen.Clock]
display = true
position = bottom-right
format = hh:mm
font-family = "Merienda"
font-size = 100
font-weight = 900
color = #F2B8C6

[LockScreen.Date]
display = true
format = dddd, MMMM dd yyyy
locale = "en_US"
font-family = "Merienda"
font-size = 22
font-weight = 600
color = #C8D4E0
margin-top = -20

[LoginScreen]
background = 1.mp4
blur = 4
brightness = -0.05
saturation = -0.1

[LoginScreen.LoginArea]
position = bottom-right
margin = -300

[LoginScreen.LoginArea.Avatar]
display = false

[LoginScreen.LoginArea.Username]
font-family = "Merienda"
font-size = 28
font-weight = 700
color = #F2B8C6
margin = 750

[LoginScreen.LoginArea.PasswordInput]
width = 55
height = 32
font-family = "Merienda"
font-size = 12
color = #FFFFFF
background-color = #0D0D0D80
background-opacity = 0.6
border-size = 1
border-color = #F2B8C660
border-radius = 16
margin-top = 12
masked-character = "●"
display-icon = false

[LoginScreen.LoginArea.LoginButton]
background-color = #F2B8C6
background-opacity = 0.9
active-background-color = #FFFFFF
active-background-opacity = 1.0
content-color = #1A1A1A
active-content-color = #000000
border-size = 0
border-radius-left = 0
border-radius-right = 16
margin-left = 0
font-family = "Merienda"
font-size = 12
font-weight = 600
display-icon = false
show-text-if-no-password = false
hide-if-not-needed = true

[LoginScreen.LoginArea.WarningMessage]
font-family = "Merienda"
font-size = 11
font-weight = 400
normal-color = #C8D4E0
warning-color = #F2B8C6
error-color = #FF7A7A
margin-top = 10

[LoginScreen.MenuArea.Buttons]
margin-top = 0
margin-right = 0
margin-bottom = 50
margin-left = 50
size = 32
border-radius = 16
spacing = 12
font-family = "Merienda"

[LoginScreen.MenuArea.Power]
display = true
position = bottom-left
index = 1
popup-direction = up
popup-align = center
popup-width = 110
background-color = #F2B8C6
background-opacity = 0.08
active-background-opacity = 0.2
content-color = #C8D4E0
active-content-color = #F2B8C6
border-size = 1
icon = power.svg
icon-size = 16

[LoginScreen.MenuArea.Popups]
max-height = 300
item-height = 32
item-spacing = 3
padding = 6
display-scrollbar = false
margin = 6
background-color = #0D0D0D
background-opacity = 0.85
active-option-background-color = #F2B8C620
active-option-background-opacity = 1.0
content-color = #C8D4E0
active-content-color = #F2B8C6
font-family = "Merienda"
border-size = 1
border-color = #F2B8C630
font-size = 11
icon-size = 16

[Tooltips]
enable = true
font-family = "Merienda"
font-size = 11
content-color = #C8D4E0
background-color = #0D0D0D
background-opacity = 0.85
border-radius = 8
disable-user = true
disable-login-button = true
